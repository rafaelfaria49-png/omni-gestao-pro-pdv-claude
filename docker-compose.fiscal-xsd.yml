services:
  fiscal-xsd-worker:
    build:
      context: .
      dockerfile: workers/fiscal-xsd/Dockerfile
    image: omni-fiscal-xsd-worker:local
    read_only: true
    user: "10001:10001"
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,mode=0700,uid=10001,gid=10001
    mem_limit: 768m
    cpus: 1.0
    pids_limit: 64
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      FISCAL_XSD_HOST: 0.0.0.0
      FISCAL_XSD_PORT: "8080"
    ports:
      - "127.0.0.1:18080:8080"
    networks:
      - fiscal_xsd_internal
    restart: "no"

networks:
  fiscal_xsd_internal:
    internal: true
