document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"68ae530c-f8d5-42e8-89f6-36063127a505\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",system-ui,sans-serif;background:#e7e8ec;color:#1a1d23;-webkit-font-smoothing:antialiased}\n  ::-webkit-scrollbar{width:9px;height:9px}\n  ::-webkit-scrollbar-thumb{background:#cfd2d8;border-radius:6px}\n  ::-webkit-scrollbar-track{background:transparent}\n  kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:100%;height:100vh;min-width:0;display:flex;flex-direction:column;background:#f5f6f8;overflow:hidden;font-size:14px;position:relative\">\n\n  <!-- ===== TOP BAR (compact 40px) ===== -->\n  <header style=\"flex:none;height:40px;display:flex;align-items:center;gap:12px;padding:0 12px;background:#ffffff;border-bottom:1px solid #e9eaee\">\n    <div style=\"display:flex;align-items:center;gap:8px;flex:none\">\n      <span style=\"display:inline-flex;align-items:center;justify-content:center;width:23px;height:23px;border-radius:6px;background:#11131a;color:#fff;font-weight:700;font-size:12px\">O<\u002Fspan>\n      <span style=\"font-weight:600;font-size:13px;color:#1a1d23\">OmniGestão<\u002Fspan>\n      <span style=\"font-size:11.5px;color:#9aa0ab;white-space:nowrap\">Operações <span style=\"color:#4f46e5;font-weight:600\">V3<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <button style=\"display:flex;align-items:center;gap:8px;flex:1;min-width:0;max-width:380px;height:28px;padding:0 11px;background:#f4f5f7;border:1px solid #e9eaee;border-radius:8px;color:#9aa0ab;font-size:12.5px;cursor:pointer\">\n      <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9aa0ab\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m20 20-3.5-3.5\"><\u002Fpath><\u002Fsvg>\n      <span style=\"white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">Ir para OS, cliente, IMEI…<\u002Fspan>\n      <kbd style=\"margin-left:auto;font-size:10px;background:#fff;border:1px solid #e2e4e8;border-radius:4px;padding:1px 5px;color:#9aa0ab;flex:none\">⌘K<\u002Fkbd>\n    <\u002Fbutton>\n\n    <!-- MODE SWITCHER -->\n    <div style=\"flex:none;display:flex;align-items:center;gap:3px;height:28px;padding:2px;background:#f1f2f5;border:1px solid #e9eaee;border-radius:9px\">\n      <sc-for list=\"{{ modeBtns }}\" as=\"m\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ m.onClick }}\" title=\"{{ m.hint }}\" style=\"display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 10px;border:none;background:{{ m.bg }};color:{{ m.fg }};border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer;box-shadow:{{ m.shadow }}\">\n          <span style=\"font-size:11px\">{{ m.icon }}<\u002Fspan>{{ m.label }}\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"flex:none;display:flex;align-items:center;gap:8px;margin-left:auto\">\n      <span style=\"font-size:11.5px;color:#6b7280;white-space:nowrap\">Unidade Centro<\u002Fspan>\n      <button onclick=\"{{ goAuditoria }}\" style=\"display:inline-flex;align-items:center;height:28px;padding:0 11px;border:1px solid #d9dbe1;background:#fff;color:#6b7280;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer\">Auditoria de UX<\u002Fbutton>\n      <button onclick=\"{{ openNovaOS }}\" style=\"display:inline-flex;align-items:center;height:28px;padding:0 12px;border:none;background:#4f46e5;color:#fff;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer\">+ Nova OS<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"flex:1;min-height:0;display:flex\">\n\n    <!-- ===== ICON RAIL (functional) ===== -->\n    <nav style=\"flex:none;width:62px;background:#fbfbfc;border-righ garantia.prevista }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px\">\n                <button onclick=\"{{ act.salvarGarantia }}\" style=\"flex:1;height:32px;border:none;background:#4f46e5;color:#fff;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer\">Salvar<\u002Fbutton>\n                <button onclick=\"{{ act.imprimirTermo }}\" style=\"flex:1;height:32px;border:1px solid #e2e4e8;background:#fff;color:#1a1d23;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer\">🖨 Termo<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- PÓS-VENDA -->\n          <sc-if value=\"{{ isPos }}\">\n          <div style=\"display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);gap:12px;align-items:start\">\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <div style=\"border:1px solid #ebedf0;background:#fff;border-radius:12px;padding:14px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px\"><span style=\"font-size:13px;font-weight:600;color:#1a1d23\">Situação da garantia<\u002Fspan><span style=\"height:21px;padding:0 9px;display:inline-flex;align-items:center;gap:5px;background:#eaf1fe;color:#1d4ed8;border-radius:999px;font-size:11px;font-weight:600\"><span style=\"width:6px;height:6px;border-radius:50%;background:#2563eb\"><\u002Fspan>Prevista<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:7px\">\n                  <div style=\"display:flex;justify-content:space-between;font-size:12px\"><span style=\"color:#9aa0ab\">Tipo<\u002Fspan><span style=\"color:#1a1d23;font-weight:500\">Tela — 90 dias<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;justify-content:space-between;font-size:12px\"><span style=\"color:#9aa0ab\">Início<\u002Fspan><span style=\"color:#1a1d23;font-weight:500\">Na entrega<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;justify-content:space-between;font-size:12px\"><span style=\"color:#9aa0ab\">Vencimento<\u002Fspan><span style=\"color:#1a1d23;font-weight:500\">—<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;justify-content:space-between;font-size:12px\"><span style=\"color:#9aa0ab\">Dias restantes<\u002Fspan><span style=\"color:#1a1d23;font-weight:500\">90 (na entrega)<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ act.termoEntrega }}\" style=\"width:100%;height:30px;margin-top:11px;border:1px solid #e2e4e8;background:#fff;color:#1a1d23;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer\">🖨 Termo de Entrega<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"border:1px solid #ebedf0;background:#fff;border-radius:12px;padding:14px\">\n                <div style=\"font-size:13px;font-weight:600;color:#1a1d23;margin-bottom:11px\">Histórico de retornos<\u002Fdiv>\n                <sc-for list=\"{{ retHist }}\" as=\"r\" hint-placeholder-count=\"2\">\n                  <div style=\"display:flex;gap:10px;padding-bottom:11px\">\n                    <div style=\"display:flex;flex-direction:column;align-items:center\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ r.dot }};flex:none;margin-top:3px\"><\u002Fspan><span style=\"flex:1;width:2px;background:#ebedf0;margin-top:3px\"><\u002Fspan><\u002Fdiv>\n                    <div><div style=\"font-size:12px;color:#1a1d23\">{{ r.text }}<\u002Fdiv><div style=\"font-size:10.5px;color:#9aa0ab\">{{ r.meta }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"font-size:11.5px;color:#15803d;font-weight:600;text-align:center;padding:4px 0\">Nenhum retorno em aberto nesta OS.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"border:1px solid #ebedf0;background:#fff;border-radius:12px;padding:14px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px\"><span style=\"font-size:13px;font-weight:600;color:#1a1d23\">Retornos em garantia<\u002Fspan><span style=\"font-size:11px;color:#15803d;font-weight:600\">0 abertos<\u002Fspan><\u002Fdiv>\n              <div style=\"border:1px dashed #e0e3e8;border-radius:9px;padding:16px;text-align:center;color:#9aa0ab;font-size:11.5px;margin-bottom:10px\">Nenhum retorno registrado para esta OS.<\u002Fdiv>\n              <div style=\"display:flex;gap:6px;margin-bottom:8px\">\n                <input placeholder=\"Motivo do retorno…\" style=\"flex:1;min-width:0;height:30px;padding:0 10px;border:1px solid #e2e4e8;border-radius:8px;font-size:12px;color:#1a1d23\">\n                <button onclick=\"{{ act.abrirRetorno }}\" style=\"height:30px;padding:0 11px;border:1px solid #e2e4e8;background:#fff;color:#1a1d23;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap\">↩ Abrir<\u002Fbutton>\n              <\u002Fdiv>\n              <button onclick=\"{{ act.retornosCliente }}\" style=\"width:100%;height:30px;border:1px solid #ebedf0;background:#fafbfc;color:#4f46e5;font-size:11.5px;border-radius:8px;cursor:pointer\">Cliente: 0 retorno(s) em 1 OS →<\u002Fbutton>\n              <div style=\"font-size:10.5px;color:#9aa0ab;line-height:1.5;margin-top:10px\">Retornos abertos aqui entram no fluxo de <b>retrabalho<\u002Fb> sem gerar nova cobrança quando a garantia está ativa.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <div style=\"border:1px solid #ebedf0;background:#fff;border-radius:12px;padding:14px\">\n                <div style=\"font-size:13px;font-weight:600;color:#1a1d23;margin-bottom:10px\">Satisfação / NPS<\u002Fdiv>\n                <div style=\"display:flex;align-items:flex-end;gap:8px;margin-bottom:9px\"><span style=\"font-size:30px;font-weight:700;color:#9aa0ab;letter-spacing:-.02em;line-height:1\">—<\u002Fspan><span style=\"font-size:11.5px;color:#9aa0ab;padding-bottom:5px\">aguardando resposta<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;gap:4px;margin-bottom:11px\">\n                  <sc-for list=\"{{ npsScale }}\" as=\"ns\" hint-placeholder-count=\"5\">\n                    <div style=\"flex:1;height:6px;border-radius:3px;background:{{ ns.bg }}\"><\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <button onclick=\"{{ act.pesquisa }}\" style=\"width:100%;height:30px;border:1px solid #e2e4e8;background:#fff;color:#1a1d23;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer\">Enviar pesquisa de satisfação<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"border:1px solid #ebedf0;background:#fff;border-radius:12px;padding:14px\">\n                <div style=\"font-size:13px;font-weight:600;color:#1a1d23;margin-bottom:10px\">Follow-up<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;border:1px solid #ebedf0;border-radius:9px;padding:9px 10px;margin-bottom:8px\"><div><div style=\"font-size:12px;color:#1a1d23;font-weight:500\">Contato em +7 dias<\u002Fdiv><div style=\"font-size:10.5px;color:#9aa0ab\">sugerido após a entrega<\u002Fdiv><\u002Fdiv><span style=\"font-size:11px;color:#9aa0ab\">27/06<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;gap:6px\">\n                  <button onclick=\"{{ act.whatsappFollow }}\" style=\"flex:1;height:30px;border:1px solid #e2e4e8;background:#fff;color:#1a1d23;border-radius:8px;font-size:11.5px;font-weight:500;cursor:pointer\">💬 WhatsApp<\u002Fbutton>\n                  <button onclick=\"{{ act.agendar }}\" style=\"flex:1;height:30px;border:1px solid #e2e4e8;background:#fff;color:#1a1d23;border-radius:8px;font-size:11.5px;font-weight:500;cursor:pointer\">📅 Agendar<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- HISTÓRICO -->\n          <sc-if value=\"{{ isHist }}\">\n          <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap\">\n            <sc-for list=\"{{ histFilters }}\" as=\"hf\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ hf.onClick }}\" style=\"height:28px;padding:0 12px;border:1px solid {{ hf.bd }};background:{{ hf.bg }};color:{{ hf.fg }};border-radius:999px;font-size:11.5px;font-weight:600;cursor:pointer\">{{ hf.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n            <span style=\"flex:1\"><\u002Fspan>\n            <button onclick=\"{{ act.exportHist }}\" style=\"height:28px;padding:0 12px;border:1px solid #e2e4e8;background:#fff;color:#1a1d23;border-radius:8px;font-size:11.5px;font-weight:500;cursor:pointer\">⬇ Exportar auditoria<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:minmax(0,1.3fr) minmax(0,1fr);gap:12px;align-items:start\">\n            <div style=\"border:1px solid #ebedf0;background:#fff;border-radius:12px;padding:14px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">\n                <span style=\"font-size:13px;font-weight:600;color:#1a1d23\">Histórico completo (auditoria)<\u002Fspan>\n                <span style=\"font-size:10.5px;color:#9aa0ab\">{{ histCount }} eventos<\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ hist }}\" as=\"h\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;gap:11px;padding-bottom:11px\">\n                  <div style=\"display:flex;flex-direction:column;align-items:center\"><span style=\"width:9px;height:9px;border-radius:50%;background:{{ h.dot }}\"><\u002Fspan><span style=\"flex:1;width:2px;background:#ebedf0;margin-top:3px\"><\u002Fspan><\u002Fdiv>\n                  <div><div style=\"font-size:12.5px;color:#1a1d23\">{{ h.text }}<\u002Fdiv><div style=\"font-size:11px;color:#9aa0ab\">{{ h.meta }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <div style=\"border:1px solid #ebedf0;background:#fff;border-radius:12px;padding:14px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px\"><span style=\"font-size:13px;font-weight:600;color:#1a1d23\">Anexos<\u002Fspan><span style=\"font-size:11px;color:#9aa0ab\">4 arquivos<\u002Fspan><\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px\">\n                  <sc-for list=\"{{ anexos }}\" as=\"ax\" hint-placeholder-count=\"4\">\n                    <div style=\"border:1px solid #ebedf0;border-radius:9px;overflow:hidden\">\n                      <div style=\"height:62px;background:repeating-linear-gradient(45deg,#f1f2f5,#f1f2f5 5px,#e9eaee 5px,#e9eaee 10px);position:relative\"><span style=\"position:absolute;left:5px;top:5px;font-size:8px;background:rgba(0,0,0,.55);color:#fff;padding:1px 5px;border-radius:3px\">{{ ax.kind }}<\u002Fspan><\u002Fdiv>\n                      <div style=\"padding:6px 8px;font-size:11px;color:#1a1d23;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ ax.name }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"border:1px solid #ebedf0;background:#fff;border-radius:12px;padding:14px\">\n                <div style=\"font-size:13px;font-weight:600;color:#1a1d23;margin-bottom:10px\">Observações (2)<\u002Fdiv>\n                <div style=\"border:1px solid #ebedf0;border-radius:8px;background:#fafbfc;padding:9px;margin-bottom:7px\"><div style=\"font-size:12px;color:#1a1d23\">Cliente autoriza contato por WhatsApp.<\u002Fdiv><div style=\"font-size:10.5px;color:#9aa0ab;margin-top:3px\">Rafael<\u002Fdiv><\u002Fdiv>\n                <div style=\"border:1px solid #ebedf0;border-radius:8px;background:#fafbfc;padding:9px\"><div style=\"font-size:12px;color:#1a1d23\">Sinais de assistência anterior (parafusos).<\u002Fdiv><div style=\"font-size:10.5px;color:#9aa0ab;margin-top:3px\">Bruno · interna<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ACTIVITY COLUMN -->\n      <sc-if value=\"{{ rightOpen }}\" hint-placeholder-val=\"{{ true }}\">\n      <aside style=\"flex:none;width:288px;background:#fff;border-left:1px solid #e9eaee;display:flex;flex-direction:column\">\n        <div style=\"flex:none;display:flex;align-items:center;justify-content:space-between;height:36px;padding:0 12px;border-bottom:1px solid #f0f1f4\">\n          <span style=\"font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#9aa0ab;font-weight:700\">Atividade<\u002Fspan>\n          <button onclick=\"{{ toggleRight }}\" title=\"Recolher\" style=\"width:23px;height:23px;border:none;background:#f4f5f7;border-radius:6px;color:#9aa0ab;cursor:pointer;font-size:13px\">›<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-height:0;overflow-y:auto;padding:12px\">\n          <div style=\"margin-bottom:14px\">\n            <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"7\">\n              <div style=\"display:flex;gap:10px\">\n                <div style=\"display:flex;flex-direction:column;align-items:center\">\n                  <sc-if value=\"{{ s.reached }}\"><span style=\"width:20px;height:20px;border-radius:50%;background:#16a34a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;flex:none\">✓<\u002Fspan><\u002Fsc-if>\n                  <sc-if valu ext-overflow:ellipsis\">{{ o.cliente }} · <span style=\"color:#9aa0ab\">{{ o.aparelho }}<\u002Fspan><\u002Fspan>\n                <span style=\"display:inline-flex;align-items:center;height:21px;padding:0 9px;background:{{ o.tagBg }};color:{{ o.tagFg }};border-radius:999px;font-size:10.5px;font-weight:600\">{{ o.etapa }}<\u002Fspan>\n                <span style=\"font-size:10.5px;color:{{ o.slaColor }};font-weight:600;width:64px;text-align:right\">{{ o.sla }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== AUDITORIA UX PAGE ===== -->\n    <sc-if value=\"{{ isAuditoria }}\" data-screen-label=\"Auditoria de UX\">\n    <div style=\"flex:1;min-width:0;overflow-y:auto;background:#f5f6f8\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:30px 44px 90px\">\n        <button onclick=\"{{ goCockpit }}\" style=\"display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 13px;border:1px solid #d9dbe1;background:#fff;color:#1a1d23;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:24px\">← Voltar ao cockpit<\u002Fbutton>\n        <div style=\"font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#4f46e5;font-weight:700;margin-bottom:6px\">Auditoria · Operações V3 · iteração 3<\u002Fdiv>\n        <h1 style=\"margin:0 0 10px;font-size:30px;font-weight:700;letter-spacing:-.02em;color:#11131a\">Layout fluido, modos de uso e paridade total<\u002Fh1>\n        <p style=\"margin:0 0 26px;font-size:15px;line-height:1.65;color:#5b616b;max-width:800px\">Esta iteração mantém a arquitetura do cockpit e resolve os pontos pendentes: <b>rolagem horizontal eliminada<\u002Fb> (layout 100% fluido), <b>laterais recolhíveis de verdade<\u002Fb> com 3 modos de uso, <b>abas completas<\u002Fb> (Financeiro, Entrega, Pós-venda) e <b>rail de ícones funcional<\u002Fb> com telas reais de módulo.<\u002Fp>\n\n        <h2 style=\"font-size:19px;font-weight:700;color:#11131a;margin:0 0 14px;padding-bottom:9px;border-bottom:2px solid #ebedf0\">Resolvido nesta iteração<\u002Fh2>\n        <div style=\"border:1px solid #ebedf0;border-radius:12px;overflow:hidden\">\n          <sc-for list=\"{{ resolved }}\" as=\"r\" hint-placeholder-count=\"10\">\n            <div style=\"display:grid;grid-template-columns:minmax(0,1.1fr) minmax(0,1.6fr) minmax(0,0.5fr);border-top:1px solid #ebedf0;font-size:12.5px;color:#1a1d23;background:{{ r.bg }}\"><div style=\"padding:11px 14px;font-weight:600\">{{ r.feat }}<\u002Fdiv><div style=\"padding:11px 14px;color:#5b616b\">{{ r.detail }}<\u002Fdiv><div style=\"padding:11px 14px;color:#15803d;font-weight:700\">{{ r.status }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <h2 style=\"font-size:19px;font-weight:700;color:#11131a;margin:32px 0 14px;padding-bottom:9px;border-bottom:2px solid #ebedf0\">Os 3 modos de uso<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);gap:12px\">\n          <div style=\"border:1px solid #ebedf0;background:#fff;border-radius:12px;padding:15px\"><div style=\"font-size:13.5px;font-weight:700;color:#11131a;margin-bottom:6px\">🛎 Recepção<\u002Fdiv><p style=\"margin:0;font-size:12.5px;color:#5b616b;line-height:1.6\">Cliente aberto + Atividade aberta. Para abrir OS, conferir dados e dar baixa de entrada no balcão.<\u002Fp><\u002Fdiv>\n          <div style=\"border:1px solid #ebedf0;background:#fff;border-radius:12px;padding:15px\"><div style=\"font-size:13.5px;font-weight:700;color:#11131a;margin-bottom:6px\">🔧 Bancada<\u002Fdiv><p style=\"margin:0;font-size:12.5px;color:#5b616b;line-height:1.6\">Ambas as laterais recolhidas, workspace máximo. Foco total na execução do reparo, sem rolagem horizontal.<\u002Fp><\u002Fdiv>\n          <div style=\"border:1px solid #ebedf0;background:#fff;border-radius:12px;padding:15px\"><div style=\"font-size:13.5px;font-weight:700;color:#11131a;margin-bottom:6px\">🔍 Auditoria<\u002Fdiv><p style=\"margin:0;font-size:12.5px;color:#5b616b;line-height:1.6\">Cliente recolhido + Atividade aberta. Revisar a linha do tempo e o histórico sem distração com os dados do cliente.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <h2 style=\"font-size:19px;font-weight:700;color:#11131a;margin:32px 0 14px;padding-bottom:9px;border-bottom:2px solid #ebedf0\">Pendências (próxima fase)<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px\">\n          <sc-for list=\"{{ pending }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <div style=\"border:1px solid #ebedf0;background:#fff;border-radius:12px;padding:14px\"><div style=\"display:flex;align-items:center;gap:7px;margin-bottom:5px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#d97706\"><\u002Fspan><span style=\"font-size:13px;font-weight:700;color:#11131a\">{{ p.title }}<\u002Fspan><\u002Fdiv><p style=\"margin:0;font-size:12px;color:#5b616b;line-height:1.55\">{{ p.text }}<\u002Fp><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"height:32px\"><\u002Fdiv>\n        <button onclick=\"{{ goCockpit }}\" style=\"display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 16px;border:none;background:#4f46e5;color:#fff;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer\">← Voltar ao cockpit interativo<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- NOVA OS MODAL -->\n  <sc-if value=\"{{ novaOSOpen }}\">\n  <div style=\"position:absolute;inset:0;z-index:70;background:rgba(17,19,26,.42);display:flex;align-items:center;justify-content:center;padding:24px\">\n    <div style=\"width:760px;max-width:100%;max-height:90vh;display:flex;flex-direction:column;background:#fff;border-radius:14px;box-shadow:0 24px 60px rgba(17,19,26,.3);overflow:hidden\">\n      <div style=\"flex:none;display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #ebedf0\">\n        <div><div style=\"font-size:15px;font-weight:700;color:#11131a\">Nova Ordem de Serviço<\u002Fdiv><div style=\"font-size:11.5px;color:#9aa0ab\">Unidade Centro · abertura no balcão<\u002Fdiv><\u002Fdiv>\n        <button onclick=\"{{ closeNovaOS }}\" style=\"width:28px;height:28px;border:none;background:#f4f5f7;border-radius:8px;color:#6b7280;font-size:16px;cursor:pointer\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-height:0;overflow-y:auto;padding:18px\">\n        <div style=\"display:flex;gap:3px;padding:3px;background:#f1f2f5;border-radius:9px;margin-bottom:14px;width:fit-content\">\n          <button onclick=\"{{ setNovaBuscar }}\" style=\"height:28px;padding:0 16px;border:none;background:{{ buscarBg }};color:{{ buscarFg }};border-radius:7px;font-size:12px;font-weight:600;cursor:pointer\">Buscar cliente<\u002Fbutton>\n          <button onclick=\"{{ setNovaNovo }}\" style=\"height:28px;padding:0 16px;border:none;background:{{ novoBg }};color:{{ novoFg }};border-radius:7px;font-size:12px;font-weight:600;cursor:pointer\">Cadastrar novo<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ novaBuscar }}\">\n        <div style=\"margin-bottom:16px\">\n          <input placeholder=\"Buscar por nome, CPF, telefone ou IMEI…\" style=\"width:100%;height:34px;padding:0 12px;border:1px solid #e2e4e8;border-radius:9px;font-size:13px;color:#1a1d23;margin-bottom:9px\">\n          <sc-for list=\"{{ clientesBusca }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ c.onClick }}\" style=\"display:flex;width:100%;align-items:center;gap:11px;text-align:left;border:1px solid #ebedf0;background:#fff;border-radius:9px;padding:9px 11px;margin-bottom:6px;cursor:pointer\" style-hover=\"border-color:#c7ccfa\">\n              <span style=\"width:32px;height:32px;border-radius:50%;background:#eef0fe;color:#4338ca;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none\">{{ c.ini }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0\"><div style=\"font-size:12.5px;font-weight:600;color:#11131a\">{{ c.nome }}<\u002Fdiv><div style=\"font-size:11px;color:#9aa0ab\">{{ c.doc }} · {{ c.tel }}<\u002Fdiv><\u002Fdiv>\n              <span style=\"font-size:11px;color:#6b7280;flex:none\">{{ c.os }} OS<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ novaNovo }}\">\n        <div style=\"display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;margin-bottom:16px\">\n          <div><div style=\"font-size:10px;text-transform:uppercase;color:#9aa0ab;font-weight:600;margin-bottom:3px\">Nome completo<\u002Fdiv><input placeholder=\"Nome do cliente\" style=\"width:100%;height:32px;padding:0 11px;border:1px solid #e2e4e8;border-radius:8px;font-size:12.5px;color:#1a1d23\"><\u002Fdiv>\n          <div><div style=\"font-size:10px;text-transform:uppercase;color:#9aa0ab;font-weight:600;margin-bottom:3px\">Telefone<\u002Fdiv><input placeholder=\"(11) 90000-0000\" style=\"width:100%;height:32px;padding:0 11px;border:1px solid #e2e4e8;border-radius:8px;font-size:12.5px;color:#1a1d23\"><\u002Fdiv>\n          <div><div style=\"font-size:10px;text-transform:uppercase;color:#9aa0ab;font-weight:600;margin-bottom:3px\">Documento (CPF/CNPJ)<\u002Fdiv><input placeholder=\"000.000.000-00\" style=\"width:100%;height:32px;padding:0 11px;border:1px solid #e2e4e8;border-radius:8px;font-size:12.5px;color:#1a1d23\"><\u002Fdiv>\n          <div><div style=\"font-size:10px;text-transform:uppercase;color:#9aa0ab;font-weight:600;margin-bottom:3px\">E-mail<\u002Fdiv><input placeholder=\"cliente@email.com\" style=\"width:100%;height:32px;padding:0 11px;border:1px solid #e2e4e8;border-radius:8px;font-size:12.5px;color:#1a1d23\"><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:#9aa0ab;font-weight:700;margin-bottom:8px\">Equipamento<\u002Fdiv>\n        <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px\">\n          <sc-for list=\"{{ novaEquipBtns }}\" as=\"e\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ e.onClick }}\" style=\"height:30px;padding:0 13px;border:1px solid {{ e.bd }};background:{{ e.bg }};color:{{ e.fg }};border-radius:999px;font-size:12px;font-weight:600;cursor:pointer\">{{ e.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);gap:10px;margin-bottom:11px\">\n          <div><div style=\"font-size:10px;text-transform:uppercase;color:#9aa0ab;font-weight:600;margin-bottom:3px\">Marca<\u002Fdiv><input placeholder=\"Apple, Samsung…\" style=\"width:100%;height:32px;padding:0 11px;border:1px solid #e2e4e8;border-radius:8px;font-size:12.5px;color:#1a1d23\"><\u002Fdiv>\n          <div><div style=\"font-size:10px;text-transform:uppercase;color:#9aa0ab;font-weight:600;margin-bottom:3px\">Modelo<\u002Fdiv><input placeholder=\"iPhone 13 Pro…\" style=\"width:100%;height:32px;padding:0 11px;border:1px solid #e2e4e8;border-radius:8px;font-size:12.5px;color:#1a1d23\"><\u002Fdiv>\n          <div><div style=\"font-size:10px;text-transform:uppercase;color:#9aa0ab;font-weight:600;margin-bottom:3px\">Cor<\u002Fdiv><input placeholder=\"Grafite…\" style=\"width:100%;height:32px;padding:0 11px;border:1px solid #e2e4e8;border-radius:8px;font-size:12.5px;color:#1a1d23\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-bottom:14px\"><div style=\"font-size:10px;text-transform:uppercase;color:#9aa0ab;font-weight:600;margin-bottom:3px\">IMEI / Serial<\u002Fdiv><input placeholder=\"35 000000 000000 0\" style=\"width:100%;height:32px;padding:0 11px;border:1px solid #e2e4e8;border-radius:8px;font-size:12.5px;color:#1a1d23;font-family:ui-monospace,Menlo,monospace\"><\u002Fdiv>\n        <div style=\"margin-bottom:11px\"><div style=\"font-size:10px;text-transform:uppercase;color:#9aa0ab;font-weight:600;margin-bottom:3px\">Defeito relatado<\u002Fdiv><textarea placeholder=\"Descreva o problema relatado pelo cliente…\" style=\"width:100%;min-height:54px;padding:8px 11px;border:1px solid #e2e4e8;border-radius:8px;font-size:12.5px;color:#1a1d23;resize:vertical;font-family:inherit\"><\u002Ftextarea><\u002Fdiv>\n        <div style=\"margin-bottom:14px\"><div style=\"font-size:10px;text-transform:uppercase;color:#9aa0ab;font-weight:600;margin-bottom:3px\">Observações iniciais<\u002Fdiv><textarea placeholder=\"Observações internas (opcional)…\" style=\"width:100%;min-height:44px;padding:8px 11px;border:1px solid #e2e4e8;border-radius:8px;font-size:12.5px;color:#1a1d23;resize:vertical;font-family:inherit\"><\u002Ftextarea><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);gap:12px;align-items:end\">\n          <div><div style=\"font-size:10px;text-transform:uppercase;color:#9aa0ab;font-weight:600;margin-bottom:6px\">Origem<\u002Fdiv><div style=\"display:flex;gap:6px;flex-wrap:wrap\"><sc-for list=\"{{ novaOrigemBtns }}\" as=\"o\" hint-placeholder-count=\"4\"><button onclick=\"{{ o.onClick }}\" style=\"height:30px;padding:0 13px;border:1px solid {{ o.bd }};background:{{ o.bg }};color:{{ o.fg }};border-radius:999px;font-size:12px;font-weight:600;cursor:pointer\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:10px;text-transform:uppercase;color:#9aa0ab;font-weight:600;margin-bottom:3px\">Recebido por<\u002Fdiv><input value=\"Rafael\" style=\"width:100%;height:32px;padding:0 11px;border:1px solid #e2e4e8;border-radius:8px;font-size:12.5px;color:#1a1d23\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:none;display:flex;align-items:center;justify-content:flex-end;gap:9px;padding:14px 18px;border-top:1px solid #ebedf0;background:#fafbfc\">\n        <button onclick=\"{{ closeNovaOS }}\" style=\"height:36px;padding:0 16px;border:1px solid #d9dbe1;background:#fff;color:#1a1d23;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer\">Cancelar<\u002Fbutton>\n        <button onclick=\"{{ abrirOS }}\" style=\"height:36px;padding:0 18px;border:none;background:#4f46e5;color:#fff;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer\">Abrir OS<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- RECIBO MODAL -->\n  <sc-if value=\"{{ reciboOpen }}\">\n  <div style=\"position:absolute;inset:0;z-index:70;background:rgba(17,19,26,.42);display:flex;align-items:center;justify-content:center;padding:24px\">\n    <div style=\"width:380px;max-width:100%;background:#fff;border-radius:14px;box-shadow:0 24px 60px rgba(17,19,26,.3);overflow:hidden\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #ebedf0\"><div style=\"font-size:14px;font-weight:700;color:#11131a\">🧾 Recibo de pagamento<\u002Fdiv><button onclick=\"{{ closeRecibo }}\" style=\"width:26px;height:26px;border:none;background:#f4f5f7;border-radius:7px;color:#6b7280;font-size:15px;cursor:pointer\">×<\u002Fbutton><\u002Fdiv>\n      <div style=\"padding:16px\">\n        <div style=\"text-align:center;border-bottom:1px dashed #e0e3e8;padding-bottom:12px;margin-bottom:12px\"><div style=\"font-size:13px;font-weight:700;color:#11131a\">OmniGestão · Unidade Centro<\u002Fdiv><div style=\"font-size:11px;color:#9aa0ab\">{{ reciboData.codigo }} · {{ reciboData.data }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0\"><span style=\"color:#9aa0ab\">Cliente<\u002Fspan><span style=\"color:#1a1d23;font-weight:500\">{{ reciboData.cliente }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0\"><span style=\"color:#9aa0ab\">Forma de pagamento<\u002Fspan><span style=\"color:#1a1d23;font-weight:500\">{{ reciboData.forma }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0\"><span style=\"color:#9aa0ab\">Total da OS<\u002Fspan><span style=\"color:#1a1d23;font-weight:500\">{{ reciboData.total }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;font-size:15px;padding:8px 0 5px;border-top:1px solid #ebedf0;margin-top:5px\"><span style=\"font-weight:700;color:#11131a\">Valor recebido<\u002Fspan><span style=\"font-weight:700;color:#15803d\">{{ reciboData.valor }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0\"><span style=\"color:#b45309\">Saldo devedor<\u002Fspan><span style=\"color:#b45309;font-weight:700\">{{ reciboData.saldo }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-top:14px\">\n          <button onclick=\"{{ act.imprimirTermo }}\" style=\"flex:1;height:34px;border:none;background:#4f46e5;color:#fff;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer\">🖨 Imprimir recibo<\u002Fbutton>\n          <button onclick=\"{{ closeRecibo }}\" style=\"flex:none;height:34px;padding:0 14px;border:1px solid #e2e4e8;background:#fff;color:#1a1d23;border-radius:9px;font-size:12.5px;font-weight:500;cursor:pointer\">Fechar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- TOAST -->\n  <sc-if value=\"{{ showToast }}\">\n  <div style=\"position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:60;display:flex;align-items:center;gap:9px;height:38px;padding:0 16px;background:#11131a;color:#fff;border-radius:10px;box-shadow:0 8px 24px rgba(17,19,26,.28);font-size:12.5px;font-weight:500\">\n    <span style=\"color:#7dd3a8\">✓<\u002Fspan>{{ toast }}\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1600,&quot;height&quot;:900},&quot;showShortcuts&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;startStage&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;entrada&quot;,&quot;options&quot;:[&quot;entrada&quot;,&quot;diagnostico&quot;,&quot;orcamento&quot;,&quot;execucao&quot;,&quot;financeiro&quot;,&quot;entrega&quot;,&quot;posvenda&quot;,&quot;historico&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;startMode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;recepcao&quot;,&quot;options&quot;:[&quot;recepcao&quot;,&quot;bancada&quot;,&quot;auditoria&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const valid = ['entrada','diagnostico','orcamento','execucao','financeiro','entrega','posvenda','historico'];\n    const start = valid.indexOf(props && props.startStage) >= 0 ? props.startStage : 'execucao';\n    const modeMap = { recepcao:[true,true], bancada:[false,false], auditoria:[false,true] };\n    const lr = modeMap[(props && props.startMode)] || [true,true];\n    this.state = {\n      view: 'cockpit',\n      module: 'workspace',\n      stage: start,\n      status: 'em_execucao',\n      left: lr[0],\n      right: lr[1],\n      menu: null,\n      toast: '',\n      prioridade: 'alta',\n      estados: ['ok','ruim','ok','ok','ok','ok','nt','ok'],\n      tech: [true, true, true, false],\n      estadoFis: ['avariado','avariado','ok','ok','ok'],\n      faceId: false,\n      bio: true,\n      acessorios: [true, true, false, false],\n      acessoriosDev: [true, true, false, false],\n      entregaCheck: [true, true, false, false],\n      histFilter: 'todos',\n      novaOS: false,\n      novaTab: 'buscar',\n      novaEquip: 'celular',\n      novaOrigem: 'balcao',\n      secTipo: 'padrao',\n      pattern: [],\n      recibo: false,\n      orcItens: [\n        {id:1, cat:'servico', nome:'Mão de obra — troca de tela', kind:'cobrado', valor:220, custo:60, qtd:1},\n        {id:2, cat:'peca', nome:'Tela OLED (conjunto)', kind:'cobrado', valor:620, custo:330, qtd:1},\n        {id:3, cat:'acessorio', nome:'Película 3D', kind:'brinde', valor:50, custo:18, qtd:1},\n        {id:4, cat:'produto', nome:'Capa protetora (catálogo)', kind:'cobrado', valor:40, custo:15, qtd:1},\n      ],\n    };\n  }\n\n  ORDER = ['aberta','diagnostico','aguardando_aprovacao','aprovado','em_execucao','pronta','entregue'];\n  STATUS_LABEL = {\n    aberta:'Aberta', diagnostico:'Diagnóstico', aguardando_aprovacao:'Aguardando aprovação',\n    aprovado:'Aprovada', aguardando_peca:'Aguardando peça', em_execucao:'Em execução',\n    pronta:'Pronta', entregue:'Entregue', cancelada:'Cancelada',\n  };\n  TONE = {\n    aberta:{bg:'#eaf1fe',fg:'#1d4ed8',dot:'#2563eb'},\n    diagnostico:{bg:'#eaf1fe',fg:'#1d4ed8',dot:'#2563eb'},\n    aguardando_aprovacao:{bg:'#fbf1e3',fg:'#b45309',dot:'#d97706'},\n    aprovado:{bg:'#eef0fe',fg:'#4338ca',dot:'#4f46e5'},\n    aguardando_peca:{bg:'#fbf1e3',fg:'#b45309',dot:'#d97706'},\n    em_execucao:{bg:'#eef0fe',fg:'#4338ca',dot:'#4f46e5'},\n    pronta:{bg:'#e7f6ec',fg:'#15803d',dot:'#16a34a'},\n    entregue:{bg:'#f0f1f4',fg:'#4a4f58',dot:'#9aa0ab'},\n    cancelada:{bg:'#fbeaea',fg:'#b91c1c',dot:'#dc2626'},\n  };\n  PRIO = {\n    baixa:{label:'Baixa',fg:'#15803d',dot:'#16a34a'},\n    normal:{label:'Normal',fg:'#1d4ed8',dot:'#2563eb'},\n    alta:{label:'Alta',fg:'#b45309',dot:'#d97706'},\n    urgente:{label:'Urgente',fg:'#b91c1c',dot:'#dc2626'},\n  };\n  PRIMARY = {\n    aberta:{label:'Iniciar diagnóstico', to:'diagnostico', stage:'diagnostico'},\n    diagnostico:{label:'Enviar orçamento', to:'aguardando_aprovacao', stage:'orcamento'},\n    aguardando_aprovacao:{label:'Registrar aprovação', to:'aprovado', stage:'orcamento'},\n    aprovado:{label:'Iniciar serviço', to:'em_execucao', stage:'execucao'},\n    aguardando_peca:{label:'Marcar peça chegou', to:'em_execucao', stage:'execucao'},\n    em_execucao:{label:'Marcar pronta', to:'pronta', stage:'financeiro'},\n    pronta:{label:'Receber pagamento', to:'entregue', stage:'entrega'},\n    entregue:null,\n  };\n\n  notify(msg){ if(this._t) clearTimeout(this._t); this.setState({toast:msg, menu:null}); this._t = setTimeout(()=>this.setState({toast:''}), 1900); }\n  go(stage){ this.setState({ stage, view:'cockpit', module:'workspace', menu:null }); }\n  advance(){ const p = this.PRIMARY[this.state.status]; if (p){ this.setState({ status:p.to, stage:p.stage }); this.notify('Status → '+(this.STATUS_LABEL[p.to]||p.to)); } }\n  setStatusTo(s){ this.setState({status:s}); this.notify('Status → '+(this.STATUS_LABEL[s]||s)); }\n  toggleLeft(){ this.setState(s => ({ left:!s.left })); }\n  toggleRight(){ this.setState(s => ({ right:!s.right })); }\n  setView(v){ this.setState({ view:v, menu:null }); }\n  setModule(m){ this.setState({ module:m, view:'cockpit', menu:null }); }\n  setMode(mode){ const map={recepcao:[true,true],bancada:[false,false],auditoria:[false,true]}; const lr=map[mode]||[true,true]; this.setState({ left:lr[0], right:lr[1], module:'workspace', view:'cockpit', menu:null }); this.notify('Modo: '+({recepcao:'Recepção',bancada:'Bancada',auditoria:'Auditoria'}[mode])); }\n  toggleMenu(m){ this.setState(s => ({ menu: s.menu===m ? null : m })); }\n  toggleTech(i){ this.setState(s => { const t = s.tech.slice(); t[i] = !t[i]; return { tech:t }; }); }\n  setEstado(i,v){ this.setState(s => { const a = s.estados.slice(); a[i]=v; return {estados:a}; }); }\n  setFis(i,v){ this.setState(s => { const a = s.estadoFis.slice(); a[i]=v; return {estadoFis:a}; }); }\n  toggleAcc(i){ this.setState(s => { const a = s.acessorios.slice(); a[i]=!a[i]; return {acessorios:a}; }); }\n  toggleAccDev(i){ this.setState(s => { const a = s.acessoriosDev.slice(); a[i]=!a[i]; return {acessoriosDev:a}; }); }\n  toggleEntregaCheck(i){ this.setState(s => { const a = s.entregaCheck.slice(); a[i]=!a[i]; return {entregaCheck:a}; }); }\n  fmt(n){ return 'R$ ' + (Math.round(n*100)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }\n  setSecTipo(k){ this.setState({secTipo:k}); }\n  patternAdd(i){ this.setState(s=> s.pattern.includes(i) ? null : ({pattern:[...s.pattern, i]})); }\n  patternClear(){ this.setState({pattern:[]}); }\n  cycleKind(id){ const o=['cobrado','brinde','desconto']; this.setState(s=>({ orcItens: s.orcItens.map(it=> it.id===id ? {...it, kind:o[(o.indexOf(it.kind)+1)%3]} : it) })); }\n  delItem(id){ this.setState(s=>({ orcItens: s.orcItens.filter(it=>it.id!==id) })); }\n\n  curIdx(){ let i = this.ORDER.indexOf(this.state.status); if (i < 0) i = this.ORDER.indexOf('em_execucao'); return i; }\n\n  seg(active, kind){\n    const C = { ok:{bg:'#e7f6ec',fg:'#15803d',bd:'#bfe6cc'}, av:{bg:'#fbeaea',fg:'#b91c1c',bd:'#f3cccc'}, nt:{bg:'#eaf1fe',fg:'#1d4ed8',bd:'#cfe0fb'} }[kind];\n    return active ? C : {bg:'#fff',fg:'#9aa0ab',bd:'#e2e4e8'};\n  }\n\n  railSvg(id){\n    const P = {\n      dashboard:'<rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"/><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"/><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"/><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"/>',\n      fila:'<line x1=\"8\" y1=\"6\" x2=\"21\" y2=\"6\"/><line x1=\"8\" y1=\"12\" x2=\"21\" y2=\"12\"/><line x1=\"8\" y1=\"18\" x2=\"21\" y2=\"18\"/><line x1=\"3\" y1=\"6\" x2=\"3.01\" y2=\"6\"/><line x1=\"3\" y1=\"12\" x2=\"3.01\" y2=\"12\"/><line x1=\"3\" y1=\"18\" x2=\"3.01\" y2=\"18\"/>',\n      workspace:'<path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"/><path d=\"M14 2v6h6\"/><line x1=\"9\" y1=\"13\" x2=\"15\" y2=\"13\"/><line x1=\"9\" y1=\"17\" x2=\"13\" y2=\"17\"/>',\n      bancada:'<path d=\"M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z\"/>',\n      sla:'<circle cx=\"12\" cy=\"12\" r=\"9\"/><polyline points=\"12 7 12 12 15 14\"/>',\n      pdv:'<rect x=\"2\" y=\"5\" width=\"20\" height=\"14\" rx=\"2\"/><line x1=\"2\" y1=\"10\" x2=\"22\" y2=\"10\"/>',\n    }[id];\n    return React.createElement('svg', { width:18, height:18, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2, dangerouslySetInnerHTML:{ __html:P } });\n  }\n\n  renderVals(){\n    const st = this.state;\n    const ci = this.curIdx();\n    const showKbd = this.props.showShortcuts !== false;\n\n    // ---- rail ----\n    const railDef = [\n      ['dashboard','Visão geral','module'],\n      ['fila','Fila','module'],\n      ['workspace','OS','workspace'],\n      ['bancada','Bancada','module'],\n      ['sla','SLA','module'],\n      ['pdv','PDV','module'],\n    ];\n    const activeRail = st.module;\n    const rail = railDef.map(([id,label]) => {\n      const active = (id==='workspace') ? (st.view==='cockpit' && st.module==='workspace') : (st.view==='cockpit' && st.module===id);\n      return { id, label, svg: this.railSvg(id),\n        bg: active ? '#11131a' : 'transparent', fg: active ? '#fff' : '#9aa0ab',\n        onClick: () => this.setModule(id==='workspace' ? 'workspace' : id) };\n    });\n\n    // ---- modes ----\n    let curMode = 'custom';\n    if (st.left && st.right) curMode='recepcao';\n    else if (!st.left && !st.right) curMode='bancada';\n    else if (!st.left && st.right) curMode='auditoria';\n    const modeDef = [['recepcao','Recepção','🛎','Cliente + Atividade abertos'],['bancada','Bancada','🔧','Laterais recolhidas · workspace máximo'],['auditoria','Auditoria','🔍','Cliente recolhido · Atividade aberta']];\n    const modeBtns = modeDef.map(([k,label,icon,hint]) => {\n      const sel = curMode===k && st.view==='cockpit' && st.module==='workspace';\n      return { label, icon, hint, onClick:()=>this.setMode(k),\n        bg: sel ? '#fff' : 'transparent', fg: sel ? '#4338ca' : '#6b7280', shadow: sel ? '0 1px 2px rgba(17,19,26,.12)' : 'none' };\n    });\n\n    // ---- checklist entrada (3-state) ----\n    const checklistDef = ['Liga / carrega','Tela (imagem)','Touch responde','Wi-Fi / BT','Câmeras','Botões físicos','Face ID','Alto-falante'];\n    const okCount = st.estados.filter(e=>e==='ok').length;\n    const ruimCount = st.estados.filter(e=>e==='ruim').length;\n    const ntCount = st.estados.filter(e=>e==='nt').length;\n    const checklist = checklistDef.map((label,i)=>{\n      const e = st.estados[i];\n      const ok=this.seg(e==='ok','ok'), ru=this.seg(e==='ruim','av'), nt=this.seg(e==='nt','nt');\n      return { label, okBg:ok.bg,okFg:ok.fg,okBd:ok.bd, ruimBg:ru.bg,ruimFg:ru.fg,ruimBd:ru.bd, ntBg:nt.bg,ntFg:nt.fg,ntBd:nt.bd,\n        onOk:()=>this.setEstado(i,'ok'), onRuim:()=>this.setEstado(i,'ruim'), onNt:()=>this.setEstado(i,'nt') };\n    });\n\n    const fisDef = ['Tela','Traseira','Carcaça','Câmeras','Botões'];\n    const estadoFis = fisDef.map((comp,i)=>{\n      const v = st.estadoFis[i];\n      const ok=this.seg(v==='ok','ok'), av=this.seg(v==='avariado','av'), au=this.seg(v==='ausente','nt');\n      return { comp, okBg:ok.bg,okFg:ok.fg,okBd:ok.bd, avBg:av.bg,avFg:av.fg,avBd:av.bd, auBg:au.bg,auFg:au.fg,auBd:au.bd,\n        onOk:()=>this.setFis(i,'ok'), onAv:()=>this.setFis(i,'avariado'), onAu:()=>this.setFis(i,'ausente') };\n    });\n\n    const accDef = ['Capa','Cabo','Carregador','Chip'];\n    const acessorios = accDef.map((label,i)=>({ label, on: st.acessorios[i], off: !st.acessorios[i], onToggle:()=>this.toggleAcc(i) }));\n    const acessoriosDev = accDef.map((label,i)=>({ label, on: st.acessoriosDev[i], off: !st.acessoriosDev[i], onToggle:()=>this.toggleAccDev(i) }));\n\n    const entregaCheckDef = ['Aparelho ligando e testado','Tela / touch conferidos','Sem senha de
